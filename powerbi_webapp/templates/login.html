{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="card" style="max-width:380px;margin:60px auto;">
  <h2 style="color:#0B2A6F;margin-top:0;">Connexion</h2>
  <form method="post">
    <p><label>Nom d'utilisateur</label><br><input type="text" name="username" required autofocus></p>
    <p><label>Mot de passe</label><br><input type="password" name="password" required></p>
    <button type="submit">Se connecter</button>
  </form>
</div>
{% endblock %}
